<!DOCTYPE html>
<html>
<head>
  <title>Admin - TrackFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚚 TrackFlow Admin</h1>
  <p>Create and manage shipments</p>

  <h2>Create Shipment</h2>

  <input type="text" id="senderName" placeholder="Sender Name">
  <input type="text" id="senderAddress" placeholder="Sender Address">

  <input type="text" id="receiverName" placeholder="Receiver Name">
  <input type="text" id="receiverAddress" placeholder="Receiver Address">
  <input type="text" id="receiverPhone" placeholder="Receiver Phone">

  <input type="text" id="packageDetails" placeholder="Package Details">
  <input type="text" id="notes" placeholder="Notes (optional)">

  <button onclick="createShipment()">Create Shipment</button>

  <h2>All Shipments</h2>
  <div id="adminList"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
